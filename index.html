<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Travel Stories ✈️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000;
  overflow: hidden;
  font-family: 'Lato', sans-serif;
}

/* ================= INTRO ================= */
#intro {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  color: white;
  cursor: pointer;
  text-align: center;
}

#intro::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    url("photo1.jpg"), url("photo2.jpg"), url("photo3.jpg"), url("photo4.jpg"),
    url("photo5.jpg"), url("photo6.jpg"), url("photo7.jpg"), url("photo8.jpg"),
    url("photo9.jpg"), url("photo10.jpg"), url("photo11.jpg"), url("photo12.jpg"),
    url("photo13.jpg"), url("photo14.jpg"), url("photo15.jpg"), url("photo16.jpg");
  background-size: cover;
  background-position: center;
  filter: brightness(0.45);
  transform: scale(1.1);
  animation: zoom 18s infinite alternate;
}

@keyframes zoom {
  from { transform: scale(1.05); }
  to { transform: scale(1.15); }
}

#intro h1 {
  position: relative;
  z-index: 2;
  font-family: 'Playfair Display', serif;
  font-size: 56px;
  margin: 0;
}

#intro p {
  position: relative;
  z-index: 2;
  margin-top: 10px;
  font-size: 18px;
  letter-spacing: 0.2em;
}

/* ================= TRACK (NEW CORE CHANGE) ================= */
#track {
  position: fixed;
  inset: 0;
  display: flex;
  transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  will-change: transform;
}

/* EACH STORY SLIDE */
.story {
  min-width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

.story-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  filter: brightness(0.55);
  transform: scale(1.1);
}

/* TEXT */
.content {
  position: absolute;
  bottom: 90px;
  width: 100%;
  text-align: center;
  color: white;
  padding: 0 20px;
}

.label {
  font-size: 16px;
  letter-spacing: 0.35em;
  color: #f9c46b;
  text-transform: uppercase;
}

.quote {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
  margin-top: 14px;
  line-height: 1.3;
}

/* ================= TOP UI ================= */
.topbar {
  position: fixed;
  top: 14px;
  left: 12px;
  right: 12px;
  display: flex;
  justify-content: space-between;
  z-index: 10;
  color: white;
  font-size: 14px;
  letter-spacing: 0.15em;
}

/* PROGRESS */
.progress-wrap {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  gap: 4px;
  padding: 6px;
  z-index: 20;
}

.bar {
  flex: 1;
  height: 3px;
  background: rgba(255,255,255,0.25);
  overflow: hidden;
  border-radius: 2px;
}

.bar > div {
  height: 100%;
  width: 0%;
  background: #fff;
}

/* TAP ZONES */
.tap-left, .tap-right {
  position: fixed;
  top: 0;
  bottom: 0;
  width: 50%;
  z-index: 30;
}
.tap-left { left: 0; }
.tap-right { right: 0; }
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>Our Little Adventures</h1>
  <p>Tap anywhere to begin</p>
</div>

<div class="progress-wrap" id="bars"></div>

<div class="topbar">
  <div>✈️ Travel Stories</div>
  <div id="counter">1 / 16</div>
</div>

<div id="track"></div>

<div class="tap-left"></div>
<div class="tap-right"></div>

<script>

const slides = [
  {img:"photo1.jpg", label:"The Beginning", quote:"We just packed and went."},
  {img:"photo2.jpg", label:"First Light", quote:"Sunrise was worth it."},
  {img:"photo3.jpg", label:"Unexpected Finds", quote:"Best food found accidentally."},
  {img:"photo4.jpg", label:"By The Water", quote:"Peace felt like this."},
  {img:"photo5.jpg", label:"Above Everything", quote:"Hilltop magic moments."},
  {img:"photo6.jpg", label:"Golden Hour", quote:"Light turned everything gold."},
  {img:"photo7.jpg", label:"Street Chaos", quote:"Chaos we somehow loved."},
  {img:"photo8.jpg", label:"Endless Roads", quote:"Music, windows down, memories."},
  {img:"photo9.jpg", label:"Hidden Corners", quote:"Just ours."},
  {img:"photo10.jpg", label:"Coffee Stop", quote:"Coffee and calm pauses."},
  {img:"photo11.jpg", label:"After Rain", quote:"Everything sparkled again."},
  {img:"photo12.jpg", label:"Night Walks", quote:"The city felt softer."},
  {img:"photo13.jpg", label:"Slow Sundays", quote:"Doing nothing felt right."},
  {img:"photo14.jpg", label:"Local Stories", quote:"Every corner had a story."},
  {img:"photo15.jpg", label:"Last Sunrise", quote:"We didn’t want it to end."},
  {img:"photo16.jpg", label:"Until Next Time", quote:"Not goodbye, just pause."}
];

let i = 0;
let timer;

const track = document.getElementById("track");
const bars = document.getElementById("bars");
const counter = document.getElementById("counter");
const intro = document.getElementById("intro");

/* INTRO */
intro.onclick = () => {
  intro.style.display = "none";
  build();
};

function build() {

  track.innerHTML = "";
  bars.innerHTML = "";

  slides.forEach((s) => {

    const slide = document.createElement("div");
    slide.className = "story";

    slide.innerHTML = `
      <div class="story-bg" style="background-image:url('${s.img}')"></div>
      <div class="content">
        <div class="label">${s.label}</div>
        <div class="quote">"${s.quote}"</div>
      </div>
    `;

    track.appendChild(slide);

    const bar = document.createElement("div");
    bar.className = "bar";
    bar.innerHTML = "<div></div>";
    bars.appendChild(bar);
  });

  update();
  start();
}

/* CORE SWIPE MOVE */
function update() {
  track.style.transform = `translateX(-${i * 100}vw)`;

  document.querySelectorAll(".bar div").forEach((b, idx) => {
    b.style.width = idx === i ? "100%" : "0%";
  });

  counter.innerText = (i + 1) + " / " + slides.length;
}

function next() {
  i = Math.min(i + 1, slides.length - 1);
  update();
  reset();
}

function prev() {
  i = Math.max(i - 1, 0);
  update();
  reset();
}

function start() {
  timer = setInterval(() => {
    if (i < slides.length - 1) next();
  }, 5000);
}

function reset() {
  clearInterval(timer);
  start();
}

/* TAP */
document.querySelector(".tap-right").onclick = next;
document.querySelector(".tap-left").onclick = prev;

/* SWIPE */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let dx = e.changedTouches[0].clientX - startX;

  if (Math.abs(dx) > 40) {
    dx < 0 ? next() : prev();
  }
});

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") next();
  if (e.key === "ArrowLeft") prev();
});

</script>

</body>
</html>
