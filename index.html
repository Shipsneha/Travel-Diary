<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Travel Stories ✈️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000;
  overflow: hidden;
  font-family: 'Lato', sans-serif;
}

/* INTRO */
#intro {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  color: white;
  cursor: pointer;
  text-align: center;
}

.collage {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(4, 1fr);
}

.collage div {
  background-size: cover;
  background-position: center;
  filter: brightness(0.55);
}

#intro h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(34px, 8vw, 60px);
  margin: 0;
  padding: 0 20px;
}

#intro p {
  font-size: clamp(14px, 3vw, 18px);
  margin-top: 12px;
  letter-spacing: 0.15em;
  opacity: 0.9;
}

/* TRACK */
#track {
  position: fixed;
  inset: 0;
  display: flex;
  transition: transform 0.6s ease;
}

.story {
  min-width: 100vw;
  height: 100vh;
  flex-shrink: 0;
  position: relative;
}

.story-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  filter: brightness(0.55);
}

/* CONTENT */
.content {
  position: absolute;
  left: 50%;
  bottom: 8vh;
  transform: translateX(-50%);
  width: min(88%, 700px);
  text-align: center;
  color: white;
  padding: 20px;
  box-sizing: border-box;
}

.last-slide {
  top: 50%;
  bottom: auto;
  transform: translate(-50%, -50%);
  max-height: 80vh;
  overflow-y: auto;
}

.label {
  font-size: clamp(11px, 2vw, 16px);
  letter-spacing: 0.25em;
  color: #f9c46b;
  text-transform: uppercase;
}

.quote {
  font-family: 'Playfair Display', serif;
  font-size: clamp(18px, 4vw, 34px);
  line-height: 1.6;
}

/* TOPBAR */
.topbar {
  position: fixed;
  top: 14px;
  left: 12px;
  right: 12px;
  display: flex;
  justify-content: space-between;
  z-index: 10;
  color: white;
  font-size: 14px;
}

/* PROGRESS */
.progress-wrap {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  gap: 4px;
  padding: 6px;
  z-index: 20;
}

.bar {
  flex: 1;
  height: 3px;
  background: rgba(255,255,255,0.25);
}

.bar > div {
  height: 100%;
  width: 0%;
  background: #fff;
}

/* TAP */
.tap-left, .tap-right {
  position: fixed;
  top: 0;
  bottom: 0;
  width: 50%;
  z-index: 30;
}
.tap-left { left: 0; }
.tap-right { right: 0; }

/* MOBILE */
@media(max-width:768px){
  .quote { font-size: 24px; }
}
@media(max-width:480px){
  .quote { font-size: 20px; }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="collage" id="collage"></div>
  <h1>Our Little Adventures</h1>
  <p>Tap to begin</p>
</div>

<div class="progress-wrap" id="bars"></div>

<div class="topbar">
  <div>✈️ Travel Stories</div>
  <div id="counter">1 / 16</div>
</div>

<div id="track"></div>

<div class="tap-left"></div>
<div class="tap-right"></div>

<script>

const slides = [
  {img:"photo1.jpg", label:"Departure", quote:"We didn’t plan it too much — we just left."},
  {img:"photo2.jpg", label:"First Morning", quote:"The world felt new with that sunrise."},
  {img:"photo3.jpg", label:"Unexpected Turns", quote:"The best memories were never on the map."},
  {img:"photo4.jpg", label:"Still Waters", quote:"Everything slowed down here."},
  {img:"photo5.jpg", label:"Higher Ground", quote:"It felt like the world paused beneath us."},
  {img:"photo6.jpg", label:"Golden Hour", quote:"Even silence looked beautiful in this light."},
  {img:"photo7.jpg", label:"City Chaos", quote:"Somehow, the noise felt alive."},
  {img:"photo8.jpg", label:"Open Roads", quote:"Every turn had a new story waiting."},
  {img:"photo9.jpg", label:"Hidden Places", quote:"The best spots were never planned."},
  {img:"photo10.jpg", label:"Coffee Breaks", quote:"Small pauses made the trip perfect."},
  {img:"photo11.jpg", label:"Rain Moments", quote:"Even the rain joined the memory."},
  {img:"photo12.jpg", label:"Night Glow", quote:"The city looked softer after dark."},
  {img:"photo13.jpg", label:"Slow Days", quote:"We learned to enjoy doing nothing."},
  {img:"photo14.jpg", label:"Local Stories", quote:"Every corner had a voice."},
  {img:"photo15.jpg", label:"Goodbyes Near", quote:"We started noticing time too much."},
  {
    img:"photo16.jpg",
    label:"For You 🤍",
    quote:`You make everything feel a little more okay 🌿✨<br><br>

No matter how small or silly my thoughts are, you listen like they matter 🤍<br><br>

Somehow, you’ve become the only person I naturally end up sharing everything with… even my so-called “first world problems” 😌💭 even though I know I’m probably going to get an earful after all the rant 😅🤍<br><br>

And still, you never make it feel like too much. You just hear me, understand me, and somehow make things feel lighter 🫶✨<br><br>

It’s like with you, even my overthinking finds a little peace 🌙🤍`
  }
];

let i = 0;
let timer;

const track = document.getElementById("track");
const bars = document.getElementById("bars");
const counter = document.getElementById("counter");
const intro = document.getElementById("intro");

/* COLLAGE */
const collage = document.getElementById("collage");
for(let j=1;j<=16;j++){
  const d=document.createElement("div");
  d.style.backgroundImage=`url(photo${j}.jpg)`;
  collage.appendChild(d);
}

/* START */
intro.onclick = () => {
  intro.style.display = "none";
  build();
};

function build(){
  track.innerHTML="";
  bars.innerHTML="";

  slides.forEach((s, idx)=>{
    const slide=document.createElement("div");
    slide.className="story";

    slide.innerHTML=`
      <div class="story-bg" style="background-image:url('${s.img}')"></div>
      <div class="content ${idx===slides.length-1?'last-slide':''}">
        <div class="label">${s.label}</div>
        <div class="quote">${s.quote}</div>
      </div>
    `;

    track.appendChild(slide);

    const bar=document.createElement("div");
    bar.className="bar";
    bar.innerHTML="<div></div>";
    bars.appendChild(bar);
  });

  update();
  start();
}

function update(){
  track.style.transform=`translateX(-${i*100}vw)`;

  document.querySelectorAll(".bar div").forEach((b,idx)=>{
    b.style.width=idx===i?"100%":"0%";
  });

  counter.innerText=`${i+1} / ${slides.length}`;
}

function next(){
  i=Math.min(i+1,slides.length-1);
  update();
  reset();
}

function prev(){
  i=Math.max(i-1,0);
  update();
  reset();
}

function start(){
  timer=setInterval(()=>{
    if(i<slides.length-1) next();
  },5000);
}

function reset(){
  clearInterval(timer);
  start();
}

document.querySelector(".tap-right").onclick=next;
document.querySelector(".tap-left").onclick=prev;

let startX=0;
document.addEventListener("touchstart",e=>startX=e.touches[0].clientX);

document.addEventListener("touchend",e=>{
  let dx=e.changedTouches[0].clientX-startX;
  if(Math.abs(dx)>40) dx<0?next():prev();
});

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight")next();
  if(e.key==="ArrowLeft")prev();
});

</script>

</body>
</html>
