<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Travel Stories ✈️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000;
  overflow: hidden;
  font-family: 'Lato', sans-serif;
}

/* ================= INTRO SCREEN ================= */
#intro {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  color: white;
  cursor: pointer;
}

#intro::before {
  content: "";
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(4, 1fr);
  gap: 2px;
  z-index: 0;
  filter: brightness(0.5);
  background: 
    url("photo1.jpg"), url("photo2.jpg"), url("photo3.jpg"), url("photo4.jpg"),
    url("photo5.jpg"), url("photo6.jpg"), url("photo7.jpg"), url("photo8.jpg"),
    url("photo9.jpg"), url("photo10.jpg"), url("photo11.jpg"), url("photo12.jpg"),
    url("photo13.jpg"), url("photo14.jpg"), url("photo15.jpg"), url("photo16.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-blend-mode: overlay;
  animation: zoom 20s infinite alternate;
}

@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

#intro h1 {
  position: relative;
  z-index: 2;
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  text-align: center;
}

#intro p {
  position: relative;
  z-index: 2;
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.8;
}

/* ================= STORIES ================= */

#base {
  position: fixed;
  inset: 0;
  background: url("photo1.jpg") center/cover no-repeat;
  filter: brightness(0.6);
  z-index: 0;
}

.story {
  position: fixed;
  inset: 0;
  opacity: 0;
  transform: scale(1.05);
  transition: opacity .6s ease, transform .6s ease;
  z-index: 2;
}

.story.active {
  opacity: 1;
  transform: scale(1);
}

.story-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  filter: brightness(0.55);
  transform: scale(1.1);
  transition: transform 6s ease;
}

.story.active .story-bg {
  transform: scale(1);
}

.topbar {
  position: fixed;
  top: 12px;
  left: 12px;
  right: 12px;
  display: flex;
  justify-content: space-between;
  z-index: 10;
  color: white;
  font-size: 12px;
}

.progress-wrap {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  gap: 4px;
  padding: 6px;
  z-index: 20;
}

.bar {
  flex: 1;
  height: 2px;
  background: rgba(255,255,255,0.25);
}

.bar > div {
  height: 100%;
  width: 0%;
  background: #fff;
}

.content {
  position: absolute;
  bottom: 90px;
  width: 100%;
  text-align: center;
  color: white;
}

.label {
  font-size: 11px;
  letter-spacing: 0.3em;
  color: #f9c46b;
}

.quote {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  margin-top: 10px;
  padding: 0 20px;
}

.tap-left, .tap-right {
  position: fixed;
  top: 0;
  bottom: 0;
  width: 50%;
  z-index: 30;
}

.tap-left { left: 0; }
.tap-right { right: 0; }
</style>
</head>

<body>

<div id="intro">
  <h1>Our Little Adventures</h1>
  <p>Tap anywhere to begin</p>
</div>

<div id="base"></div>

<div class="progress-wrap" id="bars"></div>

<div class="topbar">
  <div>✈️ Travel Stories</div>
  <div id="counter">1 / 16</div>
</div>

<div id="container"></div>

<div class="tap-left"></div>
<div class="tap-right"></div>

<script>
const slides = [
  {img:"photo1.jpg", label:"Where It All Began", quote:"We just packed and went."},
  {img:"photo2.jpg", label:"First Morning", quote:"Sunrise was worth it."},
  {img:"photo3.jpg", label:"Lost & Found", quote:"Best food found accidentally."},
  {img:"photo4.jpg", label:"By The Water", quote:"Peace felt like this."},
  {img:"photo5.jpg", label:"Hilltop Magic", quote:"Above everything."},
  {img:"photo6.jpg", label:"Golden Hour", quote:"Light turned everything gold."},
  {img:"photo7.jpg", label:"Market Day", quote:"Chaos we loved."},
  {img:"photo8.jpg", label:"The Long Road", quote:"Music + memories."},
  {img:"photo9.jpg", label:"Hidden Corner", quote:"Just ours."},
  {img:"photo10.jpg", label:"Café Stop", quote:"Coffee & calm."},
  {img:"photo11.jpg", label:"After Rain", quote:"Everything sparkled."},
  {img:"photo12.jpg", label:"Night Walk", quote:"City felt softer."},
  {img:"photo13.jpg", label:"Sunday Slow", quote:"Doing nothing."},
  {img:"photo14.jpg", label:"Local Secrets", quote:"Stories everywhere."},
  {img:"photo15.jpg", label:"Last Sunrise", quote:"We held on."},

  {
    img:"photo16.jpg",
    label:"For You 🤍",
    quote:`You make everything feel a little more okay 🌿✨<br><br>

No matter how small or silly my thoughts are, you listen like they matter 🤍<br><br>

Somehow, you’ve become the only person I naturally end up sharing everything with… even my so-called “first world problems” 😌💭 even though I know I’m probably going to get an earful after all the rant 😅🤍<br><br>

And still, you never make it feel like too much. You just hear me, understand me, and somehow make things feel lighter 🫶✨<br><br>

It’s like with you, even my overthinking finds a little peace 🌙🤍`
  }
];

let i = 0;
let timer;

const container = document.getElementById("container");
const bars = document.getElementById("bars");
const counter = document.getElementById("counter");
const intro = document.getElementById("intro");

intro.addEventListener("click", () => {
  intro.style.opacity = "0";
  intro.style.pointerEvents = "none";
  setTimeout(() => intro.remove(), 800);
  build();
});

function build() {
  container.innerHTML = "";
  bars.innerHTML = "";

  slides.forEach((s, idx) => {
    const story = document.createElement("div");
    story.className = "story" + (idx === 0 ? " active" : "");

    story.innerHTML = `
      <div class="story-bg" style="background-image:url('${s.img}')"></div>
      <div class="content">
        <div class="label">${s.label}</div>
        <div class="quote">"${s.quote}"</div>
      </div>
    `;

    container.appendChild(story);

    const bar = document.createElement("div");
    bar.className = "bar";
    bar.innerHTML = "<div></div>";
    bars.appendChild(bar);
  });

  update();
  start();
}

function update() {
  document.querySelectorAll(".story").forEach((el, idx) => {
    el.classList.toggle("active", idx === i);
  });

  document.querySelectorAll(".bar div").forEach((b, idx) => {
    b.style.width = idx === i ? "100%" : "0%";
  });

  counter.innerText = (i + 1) + " / " + slides.length;
}

function next() {
  i = (i + 1) % slides.length;
  update();
  reset();
}

function prev() {
  i = (i - 1 + slides.length) % slides.length;
  update();
  reset();
}

function start() {
  timer = setInterval(next, 5000);
}

function reset() {
  clearInterval(timer);
  start();
}

document.querySelector(".tap-right").onclick = next;
document.querySelector(".tap-left").onclick = prev;

let startX = 0;
document.addEventListener("touchstart", e => startX = e.touches[0].clientX);
document.addEventListener("touchend", e => {
  let dx = e.changedTouches[0].clientX - startX;
  if (Math.abs(dx) > 40) dx < 0 ? next() : prev();
});

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") next();
  if (e.key === "ArrowLeft") prev();
});
</script>

</body>
</html>
