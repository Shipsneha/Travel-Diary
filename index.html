<script>
var slides = [
  { img: "photo1.jpg", label: "Where It All Began", quote: "We didn't plan this trip. We just packed, pointed at a map, and went.", emojis: ["🗺️","✈️","🌍"] },
  { img: "photo2.jpg", label: "First Morning", quote: "The alarm went off at 5 AM. We didn't mind. The sunrise was worth every minute.", emojis: ["🌅","☕","🥐"] },
  { img: "photo3.jpg", label: "Lost & Found", quote: "We got wonderfully, gloriously lost — and found the best street food of our lives.", emojis: ["🍜","🗺️","😂"] },
  { img: "photo4.jpg", label: "By The Water", quote: "Some moments don't need filters. They just need to be felt.", emojis: ["🌊","💙","🐚"] },
  { img: "photo5.jpg", label: "Hilltop Magic", quote: "At the top, breathless — from the climb and the view both.", emojis: ["⛰️","🌬️","🏔️"] },
  { img: "photo6.jpg", label: "Golden Hour", quote: "The light turned everything to honey. We stood very still and said nothing.", emojis: ["🌇","✨","🍯"] },
  { img: "photo7.jpg", label: "Market Day", quote: "Colors, chaos, and the smell of spices — a full sensory overload we'd gladly repeat.", emojis: ["🌶️","🛍️","🌸"] },
  { img: "photo8.jpg", label: "The Long Road", quote: "Hours in the car, terrible music, and the best conversation we've ever had.", emojis: ["🚗","🎵","🛣️"] },
  { img: "photo9.jpg", label: "Hidden Corner", quote: "No one told us about this place. That made it feel entirely ours.", emojis: ["🗝️","🌿","😍"] },
  { img: "photo10.jpg", label: "Café Stop", quote: "Third café of the day. The coffee was perfect. The company, even better.", emojis: ["☕","📖","💛"] },
  { img: "photo11.jpg", label: "After Rain", quote: "We got soaked. Then the clouds parted and everything sparkled like glass.", emojis: ["🌧️","🌈","💧"] },
  { img: "photo12.jpg", label: "Night Walk", quote: "The city looks different at midnight — softer, quieter, like it's finally itself.", emojis: ["🌙","🏙️","🌟"] },
  { img: "photo13.jpg", label: "Sunday Slow", quote: "We decided to do absolutely nothing. It turned out to be the best day.", emojis: ["🛋️","🍹","😴"] },
  { img: "photo14.jpg", label: "Local Secrets", quote: "The family who runs this place has been here 80 years. We hope they never leave.", emojis: ["🏡","❤️","🕯️"] },
  { img: "photo15.jpg", label: "Last Sunrise", quote: "Our final morning. We woke up early on purpose, just to hold onto it a little longer.", emojis: ["🌄","🥹","📸"] },
  { img: "photo16.jpg", label: "See You Again", quote: "Not goodbye. Just: until next time.", emojis: ["💌","✈️","🌏"] }
];

var current = 0;
var isPlaying = true;
var timer = null;
var DURATION = 5500;

var ss = document.getElementById("slideshow");
var dotsEl = document.getElementById("dots");
var counterEl = document.getElementById("counter");
var playBtn = document.getElementById("playBtn");

function renderSlides() {
  slides.forEach(function(s, i) {

    var slide = document.createElement("div");
    slide.className = "slide" + (i === 0 ? " active" : "");

    slide.innerHTML =
      '<div class="slide-bg" style="background-image:url(' + s.img + ')"></div>' +
      '<div class="slide-content">' +
        '<div class="slide-label">' + s.label + '</div>' +
        '<div class="slide-quote">“' + s.quote + '”</div>' +
        '<div class="slide-emojis">' +
          s.emojis.map(function(e){ return '<span class="emoji-float">' + e + '</span>'; }).join('') +
        '</div>' +
      '</div>';

    ss.appendChild(slide);

    var dot = document.createElement("div");
    dot.className = "dot" + (i === 0 ? " active" : "");
    dot.onclick = function(){ goTo(i); };
    dotsEl.appendChild(dot);
  });
}

function updateUI() {
  var allSlides = document.querySelectorAll(".slide");
  var allDots = document.querySelectorAll(".dot");

  allSlides.forEach(function(el, i){
    el.classList.toggle("active", i === current);
  });

  allDots.forEach(function(el, i){
    el.classList.toggle("active", i === current);
  });

  counterEl.textContent = (current + 1) + " / " + slides.length;
}

function goTo(n) {
  current = (n + slides.length) % slides.length;
  updateUI();
  restart();
}

function next() {
  goTo(current + 1);
}

function prev() {
  goTo(current - 1);
}

function restart() {
  stop();
  if (isPlaying) start();
}

function start() {
  timer = setInterval(next, DURATION);
  playBtn.innerHTML = "❚❚";
}

function stop() {
  clearInterval(timer);
  playBtn.innerHTML = "▶";
}

playBtn.onclick = function(){
  isPlaying = !isPlaying;
  isPlaying ? start() : stop();
};

document.getElementById("nextBtn").onclick = next;
document.getElementById("prevBtn").onclick = prev;

document.addEventListener("keydown", function(e){
  if (e.key === "ArrowRight") next();
  if (e.key === "ArrowLeft") prev();
});

renderSlides();
updateUI();
start();
</script>
