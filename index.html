<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Travel Stories ✈️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000;
  overflow: hidden;
  font-family: 'Lato', sans-serif;
}

/* SAFE BACKGROUND */
#base {
  position: fixed;
  inset: 0;
  background: url("photo1.jpg") center/cover no-repeat;
  filter: brightness(0.6);
  z-index: 0;
}

/* STORY WRAPPER */
.story {
  position: fixed;
  inset: 0;
  opacity: 0;
  transform: scale(1.05);
  transition: opacity .6s ease, transform .6s ease;
  z-index: 2;
}

.story.active {
  opacity: 1;
  transform: scale(1);
}

.story-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  filter: brightness(0.55);
  transform: scale(1.1);
  transition: transform 6s ease;
}

.story.active .story-bg {
  transform: scale(1);
}

/* TOP UI */
.topbar {
  position: fixed;
  top: 12px;
  left: 12px;
  right: 12px;
  display: flex;
  justify-content: space-between;
  z-index: 10;
  color: white;
  font-size: 12px;
  letter-spacing: 0.15em;
}

/* PROGRESS BAR */
.progress-wrap {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  gap: 4px;
  padding: 6px;
  z-index: 20;
}

.bar {
  flex: 1;
  height: 2px;
  background: rgba(255,255,255,0.25);
  overflow: hidden;
  border-radius: 2px;
}

.bar > div {
  height: 100%;
  width: 0%;
  background: #fff;
}

/* TEXT */
.content {
  position: absolute;
  bottom: 90px;
  width: 100%;
  text-align: center;
  color: white;
  z-index: 5;
}

.label {
  font-size: 11px;
  letter-spacing: 0.3em;
  color: #f9c46b;
}

.quote {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  margin-top: 10px;
  padding: 0 20px;
}

/* TAP ZONES */
.tap-left, .tap-right {
  position: fixed;
  top: 0;
  bottom: 0;
  width: 50%;
  z-index: 30;
}

.tap-left { left: 0; }
.tap-right { right: 0; }

</style>
</head>

<body>

<div id="base"></div>

<div class="progress-wrap" id="bars"></div>

<div class="topbar">
  <div>✈️ Travel Stories</div>
  <div id="counter">1 / 16</div>
</div>

<div id="container"></div>

<div class="tap-left"></div>
<div class="tap-right"></div>

<script>
const slides = [
  {img:"photo1.jpg", label:"Where It All Began", quote:"We just packed and went."},
  {img:"photo2.jpg", label:"First Morning", quote:"Sunrise was worth it."},
  {img:"photo3.jpg", label:"Lost & Found", quote:"Best food found accidentally."},
  {img:"photo4.jpg", label:"By The Water", quote:"Peace felt like this."},
  {img:"photo5.jpg", label:"Hilltop Magic", quote:"Above everything."},
  {img:"photo6.jpg", label:"Golden Hour", quote:"Light turned everything gold."},
  {img:"photo7.jpg", label:"Market Day", quote:"Chaos we loved."},
  {img:"photo8.jpg", label:"The Long Road", quote:"Music + memories."},
  {img:"photo9.jpg", label:"Hidden Corner", quote:"Just ours."},
  {img:"photo10.jpg", label:"Café Stop", quote:"Coffee & calm."},
  {img:"photo11.jpg", label:"After Rain", quote:"Everything sparkled."},
  {img:"photo12.jpg", label:"Night Walk", quote:"City felt softer."},
  {img:"photo13.jpg", label:"Sunday Slow", quote:"Doing nothing."},
  {img:"photo14.jpg", label:"Local Secrets", quote:"Stories everywhere."},
  {img:"photo15.jpg", label:"Last Sunrise", quote:"We held on."},
  {img:"photo16.jpg", label:"See You Again", quote:"Not goodbye."}
];

let i = 0;
let timer;

const container = document.getElementById("container");
const bars = document.getElementById("bars");
const counter = document.getElementById("counter");

function build() {
  container.innerHTML = "";
  bars.innerHTML = "";

  slides.forEach((s, idx) => {

    const story = document.createElement("div");
    story.className = "story" + (idx === 0 ? " active" : "");

    story.innerHTML = `
      <div class="story-bg" style="background-image:url('${s.img}')"></div>
      <div class="content">
        <div class="label">${s.label}</div>
        <div class="quote">"${s.quote}"</div>
      </div>
    `;

    container.appendChild(story);

    const bar = document.createElement("div");
    bar.className = "bar";
    bar.innerHTML = "<div></div>";
    bars.appendChild(bar);
  });

  update();
  start();
}

function update() {
  document.querySelectorAll(".story").forEach((el, idx) => {
    el.classList.toggle("active", idx === i);
  });

  document.querySelectorAll(".bar div").forEach((b, idx) => {
    b.style.width = idx === i ? "100%" : "0%";
  });

  counter.innerText = (i + 1) + " / " + slides.length;
}

function next() {
  i = (i + 1) % slides.length;
  update();
  reset();
}

function prev() {
  i = (i - 1 + slides.length) % slides.length;
  update();
  reset();
}

function start() {
  timer = setInterval(next, 5000);
}

function reset() {
  clearInterval(timer);
  start();
}

/* TAP + SWIPE */
document.querySelector(".tap-right").onclick = next;
document.querySelector(".tap-left").onclick = prev;

let startX = 0;
document.addEventListener("touchstart", e => startX = e.touches[0].clientX);
document.addEventListener("touchend", e => {
  let dx = e.changedTouches[0].clientX - startX;
  if (Math.abs(dx) > 40) dx < 0 ? next() : prev();
});

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") next();
  if (e.key === "ArrowLeft") prev();
});

build();
</script>

</body>
</html>
